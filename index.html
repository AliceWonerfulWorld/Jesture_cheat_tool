<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jesture Show Control</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" defer></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js" defer></script>
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <video id="camera" class="camera" playsinline muted></video>
    <canvas id="debug-canvas" class="debug-canvas"></canvas>

    <main class="app-shell" aria-live="polite">
      <header class="topbar">
        <div>
          <p class="eyebrow">Gesture Game Board</p>
          <h1>ジェスチャーお題ボード</h1>
        </div>
        <div class="status-cluster">
          <span id="camera-status" class="status-pill">Camera standby</span>
          <span id="sync-status" class="status-pill">Solo</span>
        </div>
      </header>

      <section class="control-strip" aria-label="操作">
        <button type="button" class="icon-button" data-action="home" title="ホームへ戻る" aria-label="ホームへ戻る">
          <span aria-hidden="true">⌂</span>
        </button>
        <button type="button" class="icon-button" data-action="back" title="戻る" aria-label="戻る">
          <span aria-hidden="true">←</span>
        </button>
        <button type="button" class="icon-button" data-action="reset" title="選択をリセット" aria-label="選択をリセット">
          <span aria-hidden="true">↺</span>
        </button>
        <button type="button" class="text-button" data-action="sound">音をオン</button>
        <button type="button" class="text-button" data-action="camera">カメラ開始</button>
        <button type="button" class="icon-button" data-action="fullscreen" title="全画面" aria-label="全画面">
          <span aria-hidden="true">⛶</span>
        </button>
        <div class="segmented" role="group" aria-label="同期モード">
          <button type="button" data-role="sender">操作</button>
          <button type="button" data-role="viewer">表示</button>
          <button type="button" data-role="solo" class="active">単体</button>
        </div>
      </section>

      <section id="room-panel" class="room-panel" hidden>
        <div>
          <p class="panel-label">Room</p>
          <strong id="room-id">------</strong>
        </div>
        <div>
          <p class="panel-label">表示端末 URL</p>
          <code id="viewer-url"></code>
          <p id="network-hint" class="network-hint"></p>
        </div>
        <button type="button" class="text-button" data-action="copy-room">URLコピー</button>
      </section>

      <section class="settings-panel" aria-label="ジェスチャー設定">
        <label>
          <span>決定</span>
          <input id="hold-range" type="range" min="350" max="1400" step="50" value="700">
          <output id="hold-output">0.7s</output>
        </label>
        <label>
          <span>追従</span>
          <input id="smooth-range" type="range" min="12" max="45" step="1" value="28">
          <output id="smooth-output">28%</output>
        </label>
        <label class="toggle-row">
          <input id="camera-preview-toggle" type="checkbox" checked>
          <span>カメラ映像を表示</span>
        </label>
      </section>

      <section id="stage" class="stage"></section>
    </main>

    <div id="gesture-cursor" class="gesture-cursor" aria-hidden="true">
      <span class="cursor-progress"></span>
    </div>

    <template id="home-template">
      <div class="screen-heading">
        <p class="eyebrow">Category Select</p>
        <h2>ジャンルを選んでください</h2>
      </div>
      <div id="category-grid" class="category-grid"></div>
    </template>

    <template id="detail-template">
      <div class="detail-heading">
        <div>
          <p id="category-kicker" class="eyebrow"></p>
          <h2 id="category-title"></h2>
        </div>
        <div class="score-readout">
          <span id="selected-count">0</span>
          <small>選択中</small>
        </div>
      </div>
      <div id="selection-strip" class="selection-strip" hidden></div>
      <div id="item-grid" class="item-grid"></div>
    </template>
  </body>
</html>
